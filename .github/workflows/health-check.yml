name: SDK Health Check

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Execute Isolated Health Check
        run: |
          mkdir tmp-verify
          cd tmp-verify
          npm init -y
          npm install minigigs-sdk@latest ethers
          echo "📦 Testing Registry Version of minigigs-sdk..."
          cp ../test-sdk.js . && node test-sdk.js
