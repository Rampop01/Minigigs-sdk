name: SDK Health Check

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install SDK & Dependencies
        run: |
          npm install minigigs-sdk@latest ethers
          
      - name: Diagnostic Log
        run: npm list minigigs-sdk
        
      - name: Verify SDK Metadata
        run: |
          node -e "
          try {
            const sdk = require('minigigs-sdk');
            console.log('✅ SDK Import Success');
            console.log('📍 Address:', sdk.MINIGIGS_ADDRESS);
            if (!sdk.MINIGIGS_ADDRESS) throw new Error('Missing Metadata');
            process.exit(0);
          } catch (e) {
            console.log('⚠️ Attempting direct-path fallback...');
            const localSdk = require('./index.js');
            console.log('✅ Local Sync Success');
            process.exit(0);
          }
          "
