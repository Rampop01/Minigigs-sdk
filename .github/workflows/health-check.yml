name: SDK Health Check

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install SDK & Dependencies
        run: |
          npm install minigigs-sdk@latest ethers
          
      - name: Verify Contract Connection
        run: |
          node -e "
          try {
            const sdk = require('minigigs-sdk');
            const addr = sdk.MINIGIGS_ADDRESS || 'failed';
            console.log('✅ SDK Version Integrated');
            console.log('📍 Address Found:', addr);
            if (!addr.startsWith('0x')) throw new Error('Invalid Address');
            process.exit(0);
          } catch (e) {
            console.error('❌ Integration Test Failed:', e.message);
            process.exit(1);
          }
          "
